services:
  - type: web
    name: dentray-backend
    runtime: python
    plan: standard
    region: singapore
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: APP_NAME
        value: DentRay
      - key: APP_ENV
        value: production
      - key: MODEL_PATH
        value: models/dentray_unet_model.keras
      - key: ALLOWED_ORIGINS
        sync: false
